# docker-compose.prod.yml
# Production Docker Compose for Laravel
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
    app:
        build:
            context: .
            dockerfile: docker/prod/Dockerfile
        image: daijo-industrial-support-system:latest
        container_name: laravel-prod
        restart: unless-stopped
        ports:
            - "80:80"
        environment:
            APP_ENV: production
            APP_DEBUG: false
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            REDIS_HOST: redis
            # wkhtmltopdf linux binary path inside container
            SNAPPY_PDF_BINARY: /var/www/html/vendor/h4cc/wkhtmltopdf-amd64/bin/wkhtmltopdf-amd64
            SNAPPY_IMAGE_BINARY: /var/www/html/vendor/h4cc/wkhtmltoimage-amd64/bin/wkhtmltoimage-amd64
        volumes:
            # Only mount storage for persistence (optional - can use named volumes instead)
            - ./storage:/var/www/html/storage
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - laravel-prod

    mysql:
        image: mysql:8.4
        container_name: mysql-prod
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - mysql-prod-data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
            retries: 3
            timeout: 5s
        networks:
            - laravel-prod

    redis:
        image: redis:alpine
        container_name: redis-prod
        restart: unless-stopped
        volumes:
            - redis-prod-data:/data
        networks:
            - laravel-prod

volumes:
    mysql-prod-data:
    redis-prod-data:

networks:
    laravel-prod:
        driver: bridge
